name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests (py${{ matrix.python }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install package (no extras, stdlib-only)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests (stdlib unittest)
        run: python -m unittest tests/test_all.py -v

      - name: Smoke test CLI
        run: |
          pe version
          pe doctor || true  # doctor exits non-zero without API key — that's fine
