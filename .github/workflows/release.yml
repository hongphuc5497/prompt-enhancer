name: Release to PyPI

# Triggered by pushing a tag like v1.5.0.
# Uses PyPI Trusted Publishing (OIDC) — no API token needed.
#
# One-time setup required on pypi.org BEFORE this workflow can publish:
#   1. Register the project name `prompt-enhancer-cli`:
#      https://pypi.org/manage/account/publishing/
#   2. Add a "pending publisher" for hongphuc5497/prompt-enhancer with
#      workflow file `release.yml` and environment `pypi`.
#   3. After the first successful publish, the publisher becomes permanent.
#
# Note: PyPI distribution name is `prompt-enhancer-cli` (the bare name
# `prompt-enhancer` was already taken on PyPI). The GitHub repo, the
# `prompt_enhancer` import package, and the `pe` / `prompt-enhancer` CLI
# binaries are unchanged.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distributions
        run: python -m build

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF##*/v}"
          PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.+)"/\1/')
          if [ "$TAG" != "$PYPROJECT_VERSION" ]; then
            echo "::error::tag v$TAG != pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/prompt-enhancer-cli
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
